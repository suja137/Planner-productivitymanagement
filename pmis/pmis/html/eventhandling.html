<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan-Centric Event Creator</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f0;
    display:flex;
    justify-content:center;
    margin-top:30px;
}
.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input,textarea,select,button{
    width:100%;
    padding:8px;
    margin:8px 0;
}
button{
    background:#4a7c59;
    color:white;
    border:none;
    cursor:pointer;
}
#log{
    margin-top:10px;
    background:#eee;
    padding:10px;
    height:120px;
    overflow:auto;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">
<h2>Create Event</h2>

<form id="eventForm">
<input type="text" id="title" placeholder="Event Title">
<input type="date" id="date">
<textarea id="desc" placeholder="Event Description"></textarea>

<select id="priority">
<option value="">Select Priority</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<button type="submit">Create Event</button>
</form>

<button id="removeBtn">Remove Mouse Move Event</button>

<div id="log"></div>
</div>

<script>

const form = document.getElementById("eventForm");
const title = document.getElementById("title");
const date = document.getElementById("date");
const desc = document.getElementById("desc");
const priority = document.getElementById("priority");
const logBox = document.getElementById("log");
const removeBtn = document.getElementById("removeBtn");

function log(msg){
    logBox.innerHTML += msg + "<br>";
    logBox.scrollTop = logBox.scrollHeight;
}

/* ---------- 15 EVENT HANDLERS ---------- */

/* 1 CLICK */
title.addEventListener("click", ()=>log("1. Click event on title"));

/* 2 DOUBLE CLICK */
title.addEventListener("dblclick", ()=>log("2. Double click event"));

/* 3 MOUSEOVER */
title.addEventListener("mouseover", ()=>log("3. Mouse over title"));

/* 4 MOUSEOUT */
title.addEventListener("mouseout", ()=>log("4. Mouse out title"));

/* 5 MOUSEDOWN */
title.addEventListener("mousedown", ()=>log("5. Mouse down"));

/* 6 MOUSEUP */
title.addEventListener("mouseup", ()=>log("6. Mouse up"));

/* 7 MOUSEMOVE (REMOVABLE) */
function mouseMoveHandler(){
    log("7. Mouse moving inside form");
}
form.addEventListener("mousemove", mouseMoveHandler);

/* 8 KEYDOWN */
title.addEventListener("keydown", ()=>log("8. Key down"));

/* 9 KEYUP */
title.addEventListener("keyup", ()=>log("9. Key up"));

/* 10 KEYpress */
title.addEventListener("keypress", ()=>log("10. Key press"));

/* 11 INPUT */
desc.addEventListener("input", ()=>log("11. Input typing"));

/* 12 CHANGE */
priority.addEventListener("change", ()=>log("12. Priority changed"));

/* 13 FOCUS */
title.addEventListener("focus", ()=>log("13. Input focused"));

/* 14 BLUR */
title.addEventListener("blur", ()=>log("14. Input lost focus"));

/* 15 SUBMIT */
form.addEventListener("submit", function(e){
    e.preventDefault();
    log("15. Form Submitted Successfully!");
});

/* -------- REMOVE EVENT LISTENER -------- */

removeBtn.addEventListener("click", function(){
    form.removeEventListener("mousemove", mouseMoveHandler);
    log("Mouse move event removed using removeEventListener()");
});

/* EXTRA WINDOW EVENT (bonus) */
window.addEventListener("load", ()=>log("Page Loaded"));

</script>

</body>
</html
