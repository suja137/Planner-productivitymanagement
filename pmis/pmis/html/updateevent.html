<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Updation</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b132b;
    color: white;
}
main {
    display: flex;
    min-height: 100vh;
}
aside {
    width: 35%;
    background: #0f1a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    font-style: italic;
    font-size: 1.3rem;
    line-height: 1.6;
}
section {
    width: 65%;
    padding: 50px;
}
form {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 8px;
    width: 450px;
}
h2 {
    margin-top: 0;
    color: #3a86ff;
}
label {
    display: block;
    margin-top: 12px;
    font-size: 0.9rem;
}
input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}
button {
    margin-top: 18px;
    padding: 10px;
    width: 100%;
    background: #3a86ff;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>
<main>
    <aside>
        “Great event management is refining details before the audience ever notices them.”
    </aside>
    <section>
        <form>
            <h2>Update Event</h2>
            <label>Select Event</label>
            <select>
                <option>Product Launch</option>
                <option>Annual Meet</option>
                <option>Wedding Event</option>
            </select>
            <label>Client Name</label>
            <input type="text" placeholder="Enter client name">
            <label>Event Name</label>
            <input type="text" placeholder="Enter event name">
            <label>Priority</label>
            <select>
                <option>High</option>
                <option>Medium</option>
                <option>Low</option>
            </select>
            <label>Event Date</label>
            <input type="date">
            <button type="submit">Update Event</button>
        </form>
    </section>
</main>
</body>
</html>
